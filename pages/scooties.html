<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Available Scooties — Sanatan Wheels</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <!-- HEADER -->
  <header>
    <a class="brand" href="../index.html">Sanatan<span>Wheels</span></a>
    <a class="about-btn" href="about.html">About Owner</a>
  </header>

  <!-- SCOOTIES SECTION -->
  <main class="main-wrap">
    <p class="section-label">Dehradun, Uttarakhand</p>
    <h2 class="section-title">Available scooties to rent</h2>
    <div class="grid" id="scootyGrid">
      <!-- Cards injected by JS -->
    </div>
  </main>

  <script src="../js/data.js"></script>
  <script>
    const grid = document.getElementById('scootyGrid');

    SCOOTIES.forEach(s => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-img">${s.emoji}</div>
        <div class="card-body">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
            <div class="card-name">${s.name}</div>
            <span class="badge ${s.available ? 'badge-available' : 'badge-busy'}">
              ${s.available ? 'Available' : 'Rented out'}
            </span>
          </div>

          <div class="card-meta">
            <div class="meta-row">
              <span class="meta-label">Rent per day</span>
              <span class="meta-value price">₹${s.rentPerDay}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Security deposit</span>
              <span class="meta-value">₹${s.security}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Engine</span>
              <span class="meta-value">${s.cc}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Colour</span>
              <span class="meta-value">${s.color}</span>
            </div>
          </div>

          <hr class="card-divider"/>

          <a
            class="call-btn"
            href="tel:${OWNER.phone.replace(/\s/g,'')}"
            ${!s.available ? 'style="opacity:.5;pointer-events:none"' : ''}
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.63 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9 a16 16 0 0 0 6.09 6.09l1.83-1.83a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
            ${s.available ? `Call to book — ${OWNER.phone}` : 'Currently not available'}
          </a>
        </div>
      `;
      grid.appendChild(card);
    });
  </script>

</body>
</html>
