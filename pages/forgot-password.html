<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Sanatan Wheels</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="icon" type="image/jpeg" href="../images/logo.jpeg"/>
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--cream);
    }
    .auth-card {
      background: var(--white);
      border: 1px solid var(--light);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(26,18,8,.10);
    }
    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 4px;
    }
    .auth-logo span { color: var(--orange); }
    .auth-sub { font-size: 13px; color: var(--mid); margin-bottom: 28px; line-height: 1.5; }
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--mid);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--light);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--dark);
      background: var(--cream);
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus { border-color: var(--orange); background: var(--white); }
    .submit-btn {
      width: 100%;
      padding: 13px;
      background: var(--orange);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s;
    }
    .submit-btn:hover { background: var(--orange-dk); }
    .submit-btn:disabled { opacity: .6; cursor: not-allowed; }
    .error-msg, .success-msg {
      display: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .error-msg   { background: #FFE8E0; color: #A63010; }
    .success-msg { background: #D8F5E6; color: #1A6B3C; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--mid);
      text-decoration: none;
    }
    .back-link:hover { color: var(--orange); }
  </style>
</head>
<body>

  <header>
    <a class="brand" href="../index.html">Sanatan<span>Wheels</span></a>
    <a class="about-btn" href="about.html">About Owner</a>
  </header>

  <div class="auth-wrap">
    <div class="auth-card">

      <div class="auth-logo">Reset <span>password</span></div>
      <p class="auth-sub">Enter your email and we'll send you a link to reset your password.</p>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <div class="field">
        <label>Email Address</label>
        <input type="email" id="fEmail" placeholder="your@email.com"/>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="handleReset()">Send Reset Link</button>

      <a class="back-link" href="login.html">← Back to login</a>

    </div>
  </div>

  <script type="module">
    import { auth } from "../firebase-config.js";
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    window.handleReset = async function() {
      const email = document.getElementById("fEmail").value.trim();
      const btn   = document.getElementById("submitBtn");
      const errEl = document.getElementById("errorMsg");
      const okEl  = document.getElementById("successMsg");

      errEl.style.display = "none";
      okEl.style.display  = "none";

      if (!email) {
        errEl.textContent   = "Please enter your email address.";
        errEl.style.display = "block";
        return;
      }

      btn.disabled    = true;
      btn.textContent = "Sending...";

      try {
        await sendPasswordResetEmail(auth, email);
        okEl.textContent   = "Reset link sent! Check your inbox.";
        okEl.style.display = "block";
        btn.textContent    = "Link Sent ✓";
      } catch(err) {
        let msg = "Could not send reset link. Please try again.";
        if (err.code === "auth/user-not-found") msg = "No account found with this email.";
        errEl.textContent   = msg;
        errEl.style.display = "block";
        btn.disabled        = false;
        btn.textContent     = "Send Reset Link";
      }
    };

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") window.handleReset();
    });
  </script>

</body>
</html>
