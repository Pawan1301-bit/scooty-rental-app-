<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Sanatan Wheels</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--cream);
    }
    .login-card {
      background: var(--white);
      border: 1px solid var(--light);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(26,18,8,.10);
    }
    .login-logo {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 6px;
    }
    .login-logo span { color: var(--orange); }
    .login-sub {
      font-size: 13px;
      color: var(--mid);
      margin-bottom: 32px;
    }
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--mid);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--light);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--dark);
      background: var(--cream);
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus { border-color: var(--orange); background: var(--white); }
    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--orange);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s, transform .12s;
      margin-top: 8px;
    }
    .login-btn:hover { background: var(--orange-dk); transform: translateY(-1px); }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .error-msg {
      display: none;
      background: #FFE8E0;
      color: #A63010;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .back-to-site {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--mid);
      text-decoration: none;
    }
    .back-to-site:hover { color: var(--orange); }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">Sanatan<span>Wheels</span></div>
      <p class="login-sub">Admin panel — owner access only</p>

      <div class="error-msg" id="errorMsg"></div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="passInput" placeholder="••••••••" autocomplete="current-password"/>
      </div>

      <button class="login-btn" id="loginBtn" onclick="handleLogin()">Login to Admin</button>

      <a class="back-to-site" href="../index.html">← Back to website</a>
    </div>
  </div>

  <script type="module">
    import { auth } from "../firebase-config.js";
    import {
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // If already logged in, go straight to admin
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = "admin.html";
    });

    window.handleLogin = async function() {
      const email    = document.getElementById("emailInput").value.trim();
      const password = document.getElementById("passInput").value;
      const btn      = document.getElementById("loginBtn");
      const errDiv   = document.getElementById("errorMsg");

      // Basic validation
      if (!email || !password) {
        showError("Please enter your email and password.");
        return;
      }

      btn.disabled    = true;
      btn.textContent = "Logging in...";
      errDiv.style.display = "none";

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "admin.html";
      } catch (err) {
        let msg = "Login failed. Check your email and password.";
        if (err.code === "auth/user-not-found")    msg = "No account found with this email.";
        if (err.code === "auth/wrong-password")     msg = "Wrong password. Try again.";
        if (err.code === "auth/too-many-requests")  msg = "Too many attempts. Try again later.";
        showError(msg);
        btn.disabled    = false;
        btn.textContent = "Login to Admin";
      }
    };

    function showError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent    = msg;
      el.style.display  = "block";
    }

    // Allow Enter key to submit
    document.getElementById("passInput").addEventListener("keydown", e => {
      if (e.key === "Enter") window.handleLogin();
    });
  </script>

</body>
</html>
