<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — Sanatan Wheels</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    /* ── ADMIN LAYOUT ── */
    .admin-wrap { max-width: 1000px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── TOP BAR ── */
    .admin-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .admin-title {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: var(--dark);
    }
    .admin-title span { color: var(--orange); }
    .topbar-right { display: flex; gap: 10px; align-items: center; }
    .add-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--orange);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s;
    }
    .add-btn:hover { background: var(--orange-dk); }
    .logout-btn {
      background: transparent;
      border: 1.5px solid var(--light);
      border-radius: 10px;
      padding: 10px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--mid);
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .logout-btn:hover { border-color: var(--orange); color: var(--orange); }

    /* ── STATS ROW ── */
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .stat-card {
      flex: 1;
      min-width: 120px;
      background: var(--white);
      border: 1px solid var(--light);
      border-radius: 14px;
      padding: 18px 20px;
    }
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--dark);
    }
    .stat-num.orange { color: var(--orange); }
    .stat-num.green  { color: #1A6B3C; }
    .stat-num.red    { color: #A63010; }
    .stat-label { font-size: 12px; color: var(--mid); margin-top: 2px; }

    /* ── SCOOTY TABLE ── */
    .table-wrap {
      background: var(--white);
      border: 1px solid var(--light);
      border-radius: 16px;
      overflow: hidden;
    }
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--light);
    }
    .table-header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      text-align: left;
      padding: 12px 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--mid);
      background: var(--cream);
      border-bottom: 1px solid var(--light);
    }
    tbody tr {
      border-bottom: 1px solid var(--light);
      transition: background .12s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--cream); }
    td {
      padding: 14px 20px;
      font-size: 14px;
      color: var(--dark);
      vertical-align: middle;
    }
    .td-name { font-weight: 600; }
    .td-price { color: var(--orange); font-weight: 600; }

    /* ── TOGGLE SWITCH ── */
    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #FFE8E0;
      border-radius: 24px;
      transition: background .2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #A63010;
      top: 3px;
      left: 3px;
      transition: transform .2s, background .2s;
    }
    .toggle input:checked + .toggle-slider { background: #D8F5E6; }
    .toggle input:checked + .toggle-slider::before {
      transform: translateX(20px);
      background: #1A6B3C;
    }
    .toggle-label { font-size: 12px; font-weight: 600; min-width: 60px; }
    .toggle-label.avail { color: #1A6B3C; }
    .toggle-label.busy  { color: #A63010; }

    /* ── ACTION BUTTONS ── */
    .action-btns { display: flex; gap: 8px; }
    .edit-btn, .del-btn {
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }
    .edit-btn { background: var(--cream); color: var(--dark); border: 1px solid var(--light); }
    .edit-btn:hover { border-color: var(--orange); color: var(--orange); }
    .del-btn  { background: #FFE8E0; color: #A63010; }
    .del-btn:hover { opacity: .75; }

    /* ── MODAL ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,18,8,.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 24px;
      color: var(--dark);
    }
    .form-field { margin-bottom: 16px; }
    .form-field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--mid);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    .form-field input, .form-field select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--light);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--dark);
      background: var(--cream);
      outline: none;
      transition: border-color .15s;
    }
    .form-field input:focus,
    .form-field select:focus { border-color: var(--orange); background: var(--white); }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-field { flex: 1; }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
    .save-btn {
      flex: 1;
      padding: 12px;
      background: var(--orange);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s;
    }
    .save-btn:hover { background: var(--orange-dk); }
    .save-btn:disabled { opacity: .6; cursor: not-allowed; }
    .cancel-btn {
      padding: 12px 20px;
      background: var(--cream);
      color: var(--mid);
      border: 1.5px solid var(--light);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .cancel-btn:hover { border-color: var(--mid); }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--mid);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 48px;
      color: var(--mid);
      font-size: 14px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--dark);
      color: var(--white);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .2s, transform .2s;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #1A6B3C; }
    .toast.error   { background: #A63010; }

    @media (max-width: 640px) {
      table { display: none; }
      .mobile-cards { display: block !important; }
    }
    .mobile-cards { display: none; }
    .mobile-scooty-card {
      background: var(--white);
      border: 1px solid var(--light);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <a class="brand" href="../index.html">Sanatan<span>Wheels</span></a>
    <span style="font-size:13px;color:#aaa;" id="adminEmail"></span>
  </header>

  <div class="admin-wrap">

    <!-- TOP BAR -->
    <div class="admin-topbar">
      <div>
        <div class="admin-title">Admin <span>Dashboard</span></div>
        <div style="font-size:13px;color:var(--mid);margin-top:2px">Manage your scooty fleet</div>
      </div>
      <div class="topbar-right">
        <button class="add-btn" onclick="openAddModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Scooty
        </button>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num orange" id="statTotal">—</div>
        <div class="stat-label">Total scooties</div>
      </div>
      <div class="stat-card">
        <div class="stat-num green" id="statAvail">—</div>
        <div class="stat-label">Available now</div>
      </div>
      <div class="stat-card">
        <div class="stat-num red" id="statRented">—</div>
        <div class="stat-label">Rented out</div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-header-title">Your Fleet</div>
        <div style="font-size:12px;color:var(--mid)">Updates live — no need to refresh</div>
      </div>
      <div id="loadingState" class="loading">Loading your scooties...</div>
      <table id="scootyTable" style="display:none">
        <thead>
          <tr>
            <th>Scooty</th>
            <th>Rent / Day</th>
            <th>Security</th>
            <th>Engine</th>
            <th>Availability</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="scootyTableBody"></tbody>
      </table>
      <div class="mobile-cards" id="mobileCards"></div>
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="icon">🛵</div>
        <p>No scooties yet. Click "Add Scooty" to get started!</p>
      </div>
    </div>

  </div>

  <!-- ADD / EDIT MODAL -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Add New Scooty</div>

      <div class="form-field">
        <label>Scooty Name</label>
        <input type="text" id="fName" placeholder="e.g. Honda Activa 6G"/>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label>Rent Per Day (₹)</label>
          <input type="number" id="fRent" placeholder="e.g. 400"/>
        </div>
        <div class="form-field">
          <label>Security Deposit (₹)</label>
          <input type="number" id="fSecurity" placeholder="e.g. 2000"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label>Engine CC</label>
          <input type="text" id="fCC" placeholder="e.g. 110cc"/>
        </div>
        <div class="form-field">
          <label>Fuel Type</label>
          <select id="fFuel">
            <option value="Petrol">Petrol</option>
            <option value="Electric">Electric</option>
          </select>
        </div>
      </div>

      <div class="form-field">
        <label>Colour</label>
        <input type="text" id="fColor" placeholder="e.g. Pearl Blue"/>
      </div>

      <div class="form-field">
        <label>Availability</label>
        <select id="fAvailable">
          <option value="true">Available</option>
          <option value="false">Rented Out</option>
        </select>
      </div>

      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        <button class="save-btn" id="saveBtn" onclick="saveScooty()">Save Scooty</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script type="module">
    import { auth } from "../firebase-config.js";
    import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      listenScooties, addScooty,
      updateScooty, deleteScooty, toggleAvailability
    } from "../js/scootyService.js";

    let editingId   = null;
    let allScooties = [];

    // ── Auth guard — redirect if not logged in ──
    onAuthStateChanged(auth, user => {
      if (!user) {
        window.location.href = "admin-login.html";
        return;
      }
      document.getElementById("adminEmail").textContent = user.email;
      initDashboard();
    });

    function initDashboard() {
      // Live listener — updates table instantly when data changes
      listenScooties(scooties => {
        allScooties = scooties;
        renderTable(scooties);
        updateStats(scooties);
        document.getElementById("loadingState").style.display = "none";
        document.getElementById("scootyTable").style.display  =
          scooties.length ? "table" : "none";
        document.getElementById("emptyState").style.display   =
          scooties.length ? "none" : "block";
      });
    }

    function updateStats(scooties) {
      const avail = scooties.filter(s => s.available).length;
      document.getElementById("statTotal").textContent  = scooties.length;
      document.getElementById("statAvail").textContent  = avail;
      document.getElementById("statRented").textContent = scooties.length - avail;
    }

    function renderTable(scooties) {
      const tbody   = document.getElementById("scootyTableBody");
      const mobile  = document.getElementById("mobileCards");
      tbody.innerHTML  = "";
      mobile.innerHTML = "";

      scooties.forEach(s => {
        // Desktop row
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="td-name">🛵 ${s.name}</td>
          <td class="td-price">₹${s.rentPerDay}</td>
          <td>₹${s.security}</td>
          <td>${s.cc}</td>
          <td>
            <div class="toggle-wrap">
              <label class="toggle">
                <input type="checkbox" ${s.available ? "checked" : ""}
                  onchange="handleToggle('${s.id}', ${s.available})"/>
                <span class="toggle-slider"></span>
              </label>
              <span class="toggle-label ${s.available ? 'avail' : 'busy'}">
                ${s.available ? 'Available' : 'Rented'}
              </span>
            </div>
          </td>
          <td>
            <div class="action-btns">
              <button class="edit-btn" onclick="openEditModal('${s.id}')">Edit</button>
              <button class="del-btn"  onclick="handleDelete('${s.id}', '${s.name}')">Delete</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);

        // Mobile card
        const mc = document.createElement("div");
        mc.className = "mobile-scooty-card";
        mc.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div style="font-weight:600">🛵 ${s.name}</div>
            <span class="badge ${s.available ? 'badge-available' : 'badge-busy'}">
              ${s.available ? 'Available' : 'Rented'}
            </span>
          </div>
          <div style="font-size:13px;color:var(--mid);margin-bottom:12px">
            ₹${s.rentPerDay}/day · ₹${s.security} deposit · ${s.cc}
          </div>
          <div style="display:flex;gap:8px">
            <button class="edit-btn" style="flex:1" onclick="openEditModal('${s.id}')">Edit</button>
            <button class="del-btn"  onclick="handleDelete('${s.id}', '${s.name}')">Delete</button>
          </div>
        `;
        mobile.appendChild(mc);
      });
    }

    // ── Toggle availability ──
    window.handleToggle = async function(id, current) {
      try {
        await toggleAvailability(id, current);
        showToast("Availability updated!", "success");
      } catch {
        showToast("Failed to update. Try again.", "error");
      }
    };

    // ── Open Add modal ──
    window.openAddModal = function() {
      editingId = null;
      document.getElementById("modalTitle").textContent = "Add New Scooty";
      document.getElementById("saveBtn").textContent    = "Add Scooty";
      clearForm();
      document.getElementById("modalBackdrop").classList.add("open");
    };

    // ── Open Edit modal ──
    window.openEditModal = function(id) {
      const s = allScooties.find(x => x.id === id);
      if (!s) return;
      editingId = id;
      document.getElementById("modalTitle").textContent = "Edit Scooty";
      document.getElementById("saveBtn").textContent    = "Save Changes";
      document.getElementById("fName").value      = s.name;
      document.getElementById("fRent").value      = s.rentPerDay;
      document.getElementById("fSecurity").value  = s.security;
      document.getElementById("fCC").value        = s.cc;
      document.getElementById("fFuel").value      = s.fuel;
      document.getElementById("fColor").value     = s.color;
      document.getElementById("fAvailable").value = s.available ? "true" : "false";
      document.getElementById("modalBackdrop").classList.add("open");
    };

    // ── Close modal ──
    window.closeModal = function() {
      document.getElementById("modalBackdrop").classList.remove("open");
      editingId = null;
    };

    // ── Save (add or update) ──
    window.saveScooty = async function() {
      const name      = document.getElementById("fName").value.trim();
      const rentPerDay= Number(document.getElementById("fRent").value);
      const security  = Number(document.getElementById("fSecurity").value);
      const cc        = document.getElementById("fCC").value.trim();
      const fuel      = document.getElementById("fFuel").value;
      const color     = document.getElementById("fColor").value.trim();
      const available = document.getElementById("fAvailable").value === "true";

      if (!name || !rentPerDay || !security || !cc || !color) {
        showToast("Please fill in all fields.", "error");
        return;
      }

      const btn = document.getElementById("saveBtn");
      btn.disabled    = true;
      btn.textContent = "Saving...";

      const data = { name, rentPerDay, security, cc, fuel, color, available, emoji: "🛵" };

      try {
        if (editingId) {
          await updateScooty(editingId, data);
          showToast("Scooty updated!", "success");
        } else {
          await addScooty(data);
          showToast("Scooty added!", "success");
        }
        closeModal();
      } catch (err) {
        showToast("Failed to save. Try again.", "error");
      } finally {
        btn.disabled    = false;
        btn.textContent = editingId ? "Save Changes" : "Add Scooty";
      }
    };

    // ── Delete ──
    window.handleDelete = async function(id, name) {
      if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
      try {
        await deleteScooty(id);
        showToast(`"${name}" deleted.`, "success");
      } catch {
        showToast("Failed to delete. Try again.", "error");
      }
    };

    // ── Logout ──
    window.handleLogout = async function() {
      await signOut(auth);
      window.location.href = "admin-login.html";
    };

    function clearForm() {
      ["fName","fRent","fSecurity","fCC","fColor"].forEach(id => {
        document.getElementById(id).value = "";
      });
      document.getElementById("fFuel").value      = "Petrol";
      document.getElementById("fAvailable").value = "true";
    }

    // ── Toast notification ──
    function showToast(msg, type = "success") {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className   = `toast ${type} show`;
      setTimeout(() => t.className = "toast", 2800);
    }

    // Close modal on backdrop click
    document.getElementById("modalBackdrop").addEventListener("click", e => {
      if (e.target === e.currentTarget) closeModal();
    });
  </script>

</body>
</html>
