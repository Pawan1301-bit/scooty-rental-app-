<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>About the Owner — Sanatan Wheels</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <!-- HEADER -->
  <header>
    <a class="brand" href="../index.html">Sanatan<span>Wheels</span></a>
    <a class="about-btn" href="scooties.html">View scooties</a>
  </header>

  <div class="about-wrap">
    <a class="back-link" href="scooties.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to scooties
    </a>

    <div class="owner-card" id="ownerCard">
      <!-- Injected by JS -->
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script>
    const card = document.getElementById('ownerCard');

    card.innerHTML = `
      <img src="../images/logo.jpeg"
       class="owner-avatar" 
        style="object-fit:cover; width:130px; height:130px; font-size:0;" 
       alt="Ritesh Bharatwaj"/>

      <div class="owner-name">${OWNER.name}</div>
      <a href="https://instagram.com/${OWNER.instagram}" target="_blank" class="insta-handle">
   <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
  <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
  <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
</svg>@${OWNER.instagram}
</a>
    <div class="owner-tagline">${OWNER.tagline}</div>

      <p style="font-size:14px;color:var(--mid);line-height:1.7;margin-bottom:28px">
        ${OWNER.about}
      </p>

      <div class="owner-details">
        <div class="detail-row">
          <div class="detail-icon">📞</div>
          <div>
            <div class="detail-label">Phone</div>
            <div class="detail-value">${OWNER.phone}</div>
          </div>
        </div>
        <div class="detail-row">
          <div class="detail-icon">📍</div>
          <div>
            <div class="detail-label">Location</div>
            <div class="detail-value">${OWNER.location}</div>
          </div>
        </div>
        <div class="detail-row">
          <div class="detail-icon">🕐</div>
          <div>
            <div class="detail-label">Working hours</div>
            <div class="detail-value">${OWNER.hours}</div>
          </div>
        </div>
        
        <div class="detail-row">
          <div class="detail-icon">💬</div>
          <div>
            <div class="detail-label">Languages</div>
            <div class="detail-value">${OWNER.languages}</div>
          </div>
        </div>
      </div>

      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <a
          href="tel:${OWNER.phone.replace(/\s/g,'')}"
          class="call-btn"
          style="flex:1;min-width:140px"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.63 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6.09 6.09l1.83-1.83a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          Call now
        </a>
        <a
          href="https://wa.me/${OWNER.whatsapp}"
          target="_blank"
          class="call-btn"
          style="flex:1;min-width:140px;background:#1DA851"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
          WhatsApp
        </a>
      </div>
    `;
  </script>

</body>
</html>
